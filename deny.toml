[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
]
deny = ["AGPL-3.0"]

[bans]
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry  = "warn"
unknown-git       = "warn"
